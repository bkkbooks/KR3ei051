front:
  text: 序余素不知醫且不信醫每見世之庸醫偏執淺見任意妄治悖理誤人者指不勝屈故自謂嗜欲飲食稍為慎節便可寡病持此意幾三十年歲丁酉子媳孕余望孫甚切而媳素弱多疾臨産愈甚舉家惶惶莫知所為延醫十數聚論紛然無濟幹事真呼吸死生也適妹丈施君以産後十八論見與云得之世醫為效甚奇余心疑之既而無計可施乃按症投藥一服而子母保安其應如響余猶謂適然爾後值家人婦三四輩皆産後危症按論而治不爽毫釐真若以手之去物而余始稍信焉尚不敢播之於人族黨親友間以此方治之者無不神驗歷年以來百投百效交口相傳溢於四方然後知治之自有真焉藥當通神誠哉言矣於是有公世之志而願不知醫者勿吾向日之所疑疑之焉雍正己酉三月朔濛溪覺河圖道先氏漫書
