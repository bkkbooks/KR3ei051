body:
  text: 産後十八論神奇驗方紅花二兩官桂一兩五錢如婦人年三十以外加五錢熟地一兩當歸一兩雄黑豆一兩莪朮一兩麵煨赤芍一兩蒲黃二兩炒乾薑一兩三十歲外加五錢上藥九味如法炮製共為細末盛瓷瓶內臨用時每服三錢凡患産後諸症細查十八論中必其所患與所論相符乃照所論引子用水二鍾煎七分將前藥三錢衝入攪勻空心溫服即效其服數不拘多少總以病好為度大約重者不過四五服輕者二三服而已第一論孕婦有患熱病六七日小腹疼痛欲死指甲青色而口中出沫者皆因臟腑熱極以致子死腹中不能順下耳若服此藥即産用滑石榆皮各一錢水二鍾煎湯七分加陳酒三分和藥三錢熱服之第二論凡難産者因子在母腹十個月或有餘血凝結為塊名曰兒枕生時兒枕先破敗血流入衣胞中所以難産急服此藥逼去敗血自然易生用炒黃燕子糞滑石榆皮各一錢煎湯照前入酒和藥服第三論胎衣不下敗血流入衣中所致照前引服第四論産後三五日起坐不得眼見黑花及昏迷不識人者因敗血流入五臟奔注於肝若誤認為暗風治之必死惟此藥能救用陳酒一盅將生鐵燒紅浸俟冷取出再燒紅浸之如是三次用榆根皮炭元胡索各一錢共此酒煎湯七分入童便三分和服藥第五論産後口乾心悶多煩渴者乃血氣未定便吃腥酸熱物以致余血結聚於心故有此症用當歸一錢煎湯亦入童便三分和藥服第六論産後寒熱往來頭疼腰背痛者皆産時偶受風邪入於腸內敗血不盡上連心肺下至肝腎故有此症照前引服第七論産後發熱或遍身寒冷皆因散血攻注於四肢停滯日久不能還原仍結膿血甚至四肢俱腫若作水腫必誤蓋水腫則喘小便澀滯氣腫則四肢寒熱須細心辨明先服此藥逐去散血次服通寶立效用官桂紅花各一錢煎湯入陳酒三分和藥服第八論産後言語顛狂眼見鬼神乃散血攻心所致急服此藥用當歸一錢酒半盅煎服入童便三分和藥服第九論産後失音不語是七孔九竅多被敗血沖閉所致用元胡索粽皮各一錢煎湯入陳酒三分和藥服第十論産後腹痛兼瀉痢或腹脹虛滿者皆因月中誤吃生冷熱物而余血結聚日久漸甚腹脹疼痛米殼不消或膿血不止水氣入腸冷痛或敗血入小腸變赤白帶須先服此藥逐去敗血然後調治瀉痢用葛根一錢煎湯入童便陳酒和藥服第十一論産後百節疼痛乃敗血入於關節之中聚結虛脹不能還原故耳用陳酒半盅牛膝一錢煎湯入童便三分和藥服第十二論産後血崩如雞肝色昏悶發熱者因敗血未定誤吃腥酸等物所致用樟柳根杏膠各一錢煎湯入陳酒三分和藥服第十三論産後昏迷驚恐氣逆咳嗽四肢寒熱口乾心悶或背膊酸腫腹中時痛皆因血未還原早吃熱物麵食致有此症日久甚至月經不通黃赤帶下而小便或滑或脹急服此藥用引同前第十四論産後胸隔氣滿嘔逆因敗血未淨故心如有惡物兼之肺氣不清不可作傷食治宜服此藥用引同前第十五論産後小便赤色大便澀滯或産戶脹腫乃敗血流入小腸閉卻水道所致切勿認作淋澀當服此散用引同前第十六論産後舌乾鼻衄繞項生點因敗血流入五臟可用當歸一錢陳酒半盅煎湯入童便三分和藥服第十七論産後腰痛眼澀或渾身拘攣牙關緊閉或兩腳弓狀如中風者因百日內過行房事所致用蝦蟆麻子各一錢煎湯入陳酒三分和藥服第十八論産後臟腑不安言語不得咽喉作蟬聲乃月中吃熱物或停宿食而敗血攻注喘息間有上下往來與牙關相緊故有此症用乳香一錢煎湯入陳酒三分和藥服
